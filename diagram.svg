<svg width="100%" viewBox="0 0 680 466" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>How web agents actually fail: right kind of element, wrong one</title>
  <desc>On a page with several links, the agent needed the Sign in link but clicked the Create account link instead. It chose the right kind of element and the wrong instance, which happened in about one in five of its mistakes. Two very different models failed on the same steps. The page gives it thirty look-alike elements and it has to land on the exact right one.</desc>

  <rect x="0" y="0" width="680" height="466" rx="14" fill="#0e0e12"/>

  <text x="340" y="44" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#ECECEE">How web agents actually fail</text>
  <text x="340" y="68" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#9A9AA5" font-style="italic">From hundreds of their mistakes on Mind2Web.</text>

  <rect x="120" y="90" width="440" height="206" rx="10" fill="#16161c" stroke="#2a2a33" stroke-width="1"/>
  <text x="140" y="116" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#ECECEE">Task: click the “Sign in” link</text>
  <line x1="140" y1="126" x2="540" y2="126" stroke="#2a2a33" stroke-width="1"/>

  <rect x="140" y="140" width="400" height="32" rx="5" fill="#1a1a20"/>
  <text x="154" y="161" font-family="ui-monospace, monospace" font-size="12" fill="#5f5f6a">&lt;a&gt;</text>
  <text x="188" y="161" font-family="Georgia, serif" font-size="13" fill="#9A9AA5">Home</text>

  <rect x="140" y="176" width="400" height="32" rx="5" fill="#13211a" stroke="#83C167" stroke-width="1.5"/>
  <text x="154" y="197" font-family="ui-monospace, monospace" font-size="12" fill="#5f5f6a">&lt;a&gt;</text>
  <text x="188" y="197" font-family="Georgia, serif" font-size="13" fill="#ECECEE">Sign in</text>
  <text x="528" y="197" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#83C167" font-style="italic">the right one</text>

  <rect x="140" y="212" width="400" height="32" rx="5" fill="#211414" stroke="#FC6255" stroke-width="1.5"/>
  <text x="154" y="233" font-family="ui-monospace, monospace" font-size="12" fill="#5f5f6a">&lt;a&gt;</text>
  <text x="188" y="233" font-family="Georgia, serif" font-size="13" fill="#ECECEE">Create account</text>
  <text x="528" y="233" text-anchor="end" font-family="Georgia, serif" font-size="12" fill="#FC6255" font-style="italic">what it clicked</text>

  <rect x="140" y="248" width="400" height="32" rx="5" fill="#1a1a20"/>
  <text x="154" y="269" font-family="ui-monospace, monospace" font-size="12" fill="#5f5f6a">&lt;a&gt;</text>
  <text x="188" y="269" font-family="Georgia, serif" font-size="13" fill="#9A9AA5">Help</text>

  <text x="340" y="330" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" fill="#ECECEE">It knew it needed a link. It just clicked the wrong one.</text>
  <text x="340" y="352" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#9A9AA5">About one in five of its misses were exactly this.</text>

  <line x1="100" y1="380" x2="580" y2="380" stroke="#26262e" stroke-width="1"/>
  <text x="340" y="408" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#ECECEE">Two very different models failed on the same steps.</text>
  <text x="340" y="430" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="13" fill="#9A9AA5">The page gives it thirty look-alike elements, and it has to land on the exact right one.</text>
</svg>
